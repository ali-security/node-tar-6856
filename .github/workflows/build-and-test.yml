name: Build and Test
on:
  workflow_dispatch:
  push:
    branches: [main, master, sp3-ci-test]
jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [10, 12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm test
